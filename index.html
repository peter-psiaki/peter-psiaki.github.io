<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Practice FPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI Layer */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* HUD */
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: white; font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none;
        }

        /* Menus */
        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; transition: opacity 0.3s;
        }
        
        .panel {
            background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 2rem; width: 90%; max-w: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            color: white;
        }

        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; background: #475569; border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer;
            -webkit-appearance: none; margin-top: -6px; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .hit-marker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; pointer-events: none; opacity: 0; transition: opacity 0.1s;
        }
        
        /* Leaderboard table */
        .lb-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .lb-table th { text-align: left; padding: 8px; border-bottom: 2px solid #334155; color: #94a3b8; font-weight: 600; }
        .lb-table td { padding: 8px; border-bottom: 1px solid #334155; }
        .lb-table tr:nth-child(1) td { color: #fbbf24; font-weight: bold; } /* Gold */
        .lb-table tr:nth-child(2) td { color: #e2e8f0; font-weight: bold; } /* Silver */
        .lb-table tr:nth-child(3) td { color: #b45309; font-weight: bold; } /* Bronze */

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="ui-layer">
        <div id="crosshair" class="hidden"></div>
        <div id="hit-marker" class="hit-marker">
            <svg viewBox="0 0 100 100" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round">
                <line x1="20" y1="20" x2="40" y2="40" />
                <line x1="80" y1="20" x2="60" y2="40" />
                <line x1="20" y1="80" x2="40" y2="60" />
                <line x1="80" y1="80" x2="60" y2="60" />
            </svg>
        </div>
        
        <div id="hud">
            <div>Score: <span id="score-display" class="text-blue-400">0</span></div>
            <div>Time: <span id="time-display" class="text-white">60</span>s</div>
        </div>

        <div id="main-menu" class="menu-overlay">
            <div class="panel">
                <h1 class="text-3xl font-bold mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">STATIONARY SHOOTER</h1>
                
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-sm mb-1 text-gray-300">
                            <label for="sens-slider">Mouse Sensitivity</label>
                            <span id="sens-val">0.5</span>
                        </div>
                        <input type="range" id="sens-slider" min="0.1" max="2.0" step="0.1" value="0.5">
                    </div>
                    
                    <div>
                        <div class="flex justify-between text-sm mb-1 text-gray-300">
                            <label for="time-slider">Game Duration (sec)</label>
                            <span id="time-val">60</span>
                        </div>
                        <input type="range" id="time-slider" min="30" max="120" step="30" value="60">
                    </div>

                    <div>
                        <div class="flex justify-between text-sm mb-1 text-gray-300">
                            <label for="target-slider">Target Spawn Rate</label>
                            <span id="target-val">Normal</span>
                        </div>
                        <input type="range" id="target-slider" min="1" max="3" step="1" value="2">
                    </div>
                </div>

                <div class="flex gap-4 mt-8">
                    <button id="show-lb-btn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        Leaderboards
                    </button>
                    <button id="start-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        PLAY
                    </button>
                </div>
                <p class="text-xs text-gray-400 text-center mt-4">Look around with mouse. Left click to shoot.<br>Press ESC to pause.</p>
            </div>
        </div>

        <div id="leaderboard-menu" class="menu-overlay hidden">
            <div class="panel">
                <h2 class="text-2xl font-bold mb-4 text-center text-blue-400">GLOBAL LEADERBOARDS</h2>
                
                <div class="flex justify-center mb-4 gap-2">
                    <button class="lb-tab px-3 py-1 bg-blue-600 text-white rounded text-sm font-bold" data-duration="30">30s</button>
                    <button class="lb-tab px-3 py-1 bg-slate-700 text-gray-300 hover:text-white rounded text-sm font-bold" data-duration="60">60s</button>
                    <button class="lb-tab px-3 py-1 bg-slate-700 text-gray-300 hover:text-white rounded text-sm font-bold" data-duration="90">90s</button>
                    <button class="lb-tab px-3 py-1 bg-slate-700 text-gray-300 hover:text-white rounded text-sm font-bold" data-duration="120">120s</button>
                </div>

                <div class="overflow-y-auto max-h-64 mb-6" id="lb-container">
                    <div id="lb-loading" class="text-center text-gray-400 py-4">Loading scores...</div>
                    <table class="lb-table hidden" id="lb-table">
                        <thead>
                            <tr>
                                <th class="w-12">#</th>
                                <th>Name</th>
                                <th class="text-right">Score</th>
                            </tr>
                        </thead>
                        <tbody id="lb-body">
                            </tbody>
                    </table>
                </div>

                <button id="close-lb-btn" class="w-full bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                    Back to Menu
                </button>
            </div>
        </div>

        <div id="game-over-menu" class="menu-overlay hidden">
            <div class="panel text-center">
                <h2 class="text-4xl font-black mb-2 text-red-500">TIME'S UP</h2>
                <p class="text-gray-300 mb-2">Final Score</p>
                <div class="text-6xl font-bold text-white mb-6" id="final-score">0</div>
                
                <div id="standard-go-actions" class="flex gap-4">
                    <button id="restart-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        Play Again
                    </button>
                    <button id="menu-btn" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        Settings
                    </button>
                </div>

                <div id="high-score-form" class="hidden bg-slate-800 p-4 rounded-lg border border-yellow-500/30">
                    <h3 class="text-xl font-bold text-yellow-400 mb-2">NEW HIGH SCORE!</h3>
                    <p class="text-sm text-gray-300 mb-4">You made the top 10 for the <span id="hs-duration"></span>s category!</p>
                    <input type="text" id="player-name" maxlength="15" placeholder="Enter your name" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white mb-4 text-center focus:outline-none focus:border-blue-400">
                    <button id="submit-score-btn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        Submit Score
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Setup ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fps-target-game';
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        let firebaseConfig = {};
        try { firebaseConfig = JSON.parse(firebaseConfigStr); } catch (e) { console.error("Invalid config"); }
        
        let app, auth, db;
        let currentUser = null;
        let allScores = [];
        let currentLbTab = 30;

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase init failed:", e);
        }

        const initAuth = async () => {
            if (!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
            }
        };

        const listenToLeaderboard = () => {
            if (!currentUser || !db) return;
            const lbRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
            
            onSnapshot(lbRef, (snapshot) => {
                allScores = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLeaderboard();
            }, (error) => {
                console.error("Firebase fetch error", error);
                document.getElementById('lb-loading').innerText = "Failed to load leaderboards.";
            });
        };

        if (auth) {
            initAuth();
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) listenToLeaderboard();
            });
        }

        // Leaderboard Logic
        const getTopScores = (duration) => {
            return allScores
                .filter(s => s.duration === duration)
                .sort((a, b) => b.score - a.score)
                .slice(0, 10);
        };

        const isHighScore = (score, duration) => {
            if (score <= 0) return false;
            if (!currentUser) return false;
            const topScores = getTopScores(duration);
            if (topScores.length < 10) return true;
            return score > topScores[topScores.length - 1].score;
        };

        const renderLeaderboard = () => {
            const table = document.getElementById('lb-table');
            const tbody = document.getElementById('lb-body');
            const loading = document.getElementById('lb-loading');
            
            const topScores = getTopScores(currentLbTab);
            
            if (topScores.length === 0) {
                loading.classList.remove('hidden');
                loading.innerText = "No scores yet for this duration.";
                table.classList.add('hidden');
            } else {
                loading.classList.add('hidden');
                table.classList.remove('hidden');
                tbody.innerHTML = topScores.map((s, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="font-semibold truncate max-w-[120px]">${s.name.replace(/</g, "&lt;")}</td>
                        <td class="text-right font-mono">${s.score}</td>
                    </tr>
                `).join('');
            }
        };

        // UI Interactions for Leaderboard
        document.querySelectorAll('.lb-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Style update
                document.querySelectorAll('.lb-tab').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-slate-700', 'text-gray-300');
                });
                e.target.classList.remove('bg-slate-700', 'text-gray-300');
                e.target.classList.add('bg-blue-600', 'text-white');
                
                // Data update
                currentLbTab = parseInt(e.target.dataset.duration);
                renderLeaderboard();
            });
        });


        // --- Game State & Settings ---
        const gameState = {
            isPlaying: false,
            score: 0,
            timeLeft: 60,
            lastTime: 0,
            targetTimer: 0,
            settings: {
                sensitivity: 0.002, // Base multiplier for mouse movement
                duration: 60,
                spawnRate: 1000 // ms between spawns
            }
        };

        // --- DOM Elements ---
        const ui = {
            mainMenu: document.getElementById('main-menu'),
            leaderboardMenu: document.getElementById('leaderboard-menu'),
            gameOverMenu: document.getElementById('game-over-menu'),
            hud: document.getElementById('hud'),
            crosshair: document.getElementById('crosshair'),
            scoreDisplay: document.getElementById('score-display'),
            timeDisplay: document.getElementById('time-display'),
            finalScore: document.getElementById('final-score'),
            hitMarker: document.getElementById('hit-marker'),
            
            // Inputs
            sensSlider: document.getElementById('sens-slider'),
            sensVal: document.getElementById('sens-val'),
            timeSlider: document.getElementById('time-slider'),
            timeVal: document.getElementById('time-val'),
            targetSlider: document.getElementById('target-slider'),
            targetVal: document.getElementById('target-val'),
            
            // Buttons
            startBtn: document.getElementById('start-btn'),
            restartBtn: document.getElementById('restart-btn'),
            menuBtn: document.getElementById('menu-btn'),
            showLbBtn: document.getElementById('show-lb-btn'),
            closeLbBtn: document.getElementById('close-lb-btn'),
            
            // Game Over specialized
            standardActions: document.getElementById('standard-go-actions'),
            highScoreForm: document.getElementById('high-score-form'),
            submitScoreBtn: document.getElementById('submit-score-btn'),
            playerNameInput: document.getElementById('player-name'),
            hsDurationSpan: document.getElementById('hs-duration')
        };

        // --- Three.js Setup ---
        const container = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Environment
        const createEnvironment = () => {
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d4c1e, roughness: 0.8, metalness: 0.1 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 50, -20);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            scene.add(dirLight);
        };
        createEnvironment();

        // Weapon
        const createWeapon = () => {
            const gunGroup = new THREE.Group();
            
            const barrelGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 16);
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.8 });
            const barrel = new THREE.Mesh(barrelGeo, gunMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0.3, -0.3, -0.5);
            barrel.castShadow = true;
            gunGroup.add(barrel);

            const bodyGeo = new THREE.BoxGeometry(0.1, 0.15, 0.4);
            const body = new THREE.Mesh(bodyGeo, gunMat);
            body.position.set(0.3, -0.3, -0.1);
            body.castShadow = true;
            gunGroup.add(body);

            camera.add(gunGroup);
            scene.add(camera);
            return gunGroup;
        };
        const weapon = createWeapon();

        // Targets & Particles
        const targets = [];
        const targetGroup = new THREE.Group();
        scene.add(targetGroup);
        const particles = [];
        const particleGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);

        const spawnTarget = () => {
            if (!gameState.isPlaying) return;
            const isSpecial = Math.random() > 0.8;
            const geo = isSpecial ? new THREE.DodecahedronGeometry(0.6) : new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: isSpecial ? 0xffd700 : 0xef4444, roughness: 0.3, metalness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;

            const x = (Math.random() - 0.5) * 50;
            const y = Math.random() * 12 + 2;
            const z = -(Math.random() * 30 + 10);
            mesh.position.set(x, y, z);
            
            mesh.userData = {
                points: isSpecial ? 5 : 1,
                rotX: (Math.random() - 0.5) * 0.05,
                rotY: (Math.random() - 0.5) * 0.05,
                spawnTime: performance.now(),
                lifespan: isSpecial ? 3000 : 5000
            };
            mesh.scale.set(0.1, 0.1, 0.1);
            targetGroup.add(mesh);
            targets.push(mesh);
        };

        const createExplosion = (position, color) => {
            const count = 15;
            const mat = new THREE.MeshBasicMaterial({ color: color });
            for(let i=0; i<count; i++) {
                const particle = new THREE.Mesh(particleGeo, mat);
                particle.position.copy(position);
                const velocity = new THREE.Vector3((Math.random() - 0.5)*0.5, (Math.random() - 0.5)*0.5, (Math.random() - 0.5)*0.5);
                particles.push({ mesh: particle, velocity: velocity, life: 1.0 });
                scene.add(particle);
            }
        };

        // Controls
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const PI_2 = Math.PI / 2;
        
        const lockPointer = () => document.body.requestPointerLock();
        const unlockPointer = () => document.exitPointerLock();

        const onMouseMove = (event) => {
            if (document.pointerLockElement === document.body && gameState.isPlaying) {
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
                euler.setFromQuaternion(camera.quaternion);
                euler.y -= movementX * gameState.settings.sensitivity;
                euler.x -= movementY * gameState.settings.sensitivity;
                euler.x = Math.max(-PI_2 + 0.1, Math.min(PI_2 - 0.1, euler.x));
                camera.quaternion.setFromEuler(euler);
            }
        };

        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0);

        const shoot = () => {
            if (!gameState.isPlaying || document.pointerLockElement !== document.body) return;
            
            weapon.position.z += 0.1;
            weapon.rotation.x += 0.05;

            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitTarget = intersects[0].object;
                gameState.score += hitTarget.userData.points;
                ui.scoreDisplay.innerText = gameState.score;
                createExplosion(hitTarget.position, hitTarget.material.color.getHex());
                
                ui.hitMarker.style.opacity = '1';
                ui.hitMarker.style.transform = 'translate(-50%, -50%) scale(1.2)';
                setTimeout(() => {
                    ui.hitMarker.style.transform = 'translate(-50%, -50%) scale(1)';
                    ui.hitMarker.style.opacity = '0';
                }, 100);
                
                removeTarget(hitTarget);
            }
        };

        const removeTarget = (target) => {
            targetGroup.remove(target);
            const index = targets.indexOf(target);
            if (index > -1) targets.splice(index, 1);
            target.geometry.dispose();
            target.material.dispose();
        };

        document.addEventListener('mousemove', onMouseMove, false);
        document.addEventListener('mousedown', (e) => { if(e.button === 0) shoot(); }, false);
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement !== document.body && gameState.isPlaying) pauseGame();
        }, false);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Setup UI Sync
        ui.sensSlider.addEventListener('input', (e) => {
            ui.sensVal.innerText = e.target.value;
            gameState.settings.sensitivity = parseFloat(e.target.value) * 0.004;
        });
        ui.timeSlider.addEventListener('input', (e) => {
            ui.timeVal.innerText = e.target.value;
            gameState.settings.duration = parseInt(e.target.value);
            // Default LB tab to the chosen time
            currentLbTab = gameState.settings.duration;
            document.querySelector(`.lb-tab[data-duration="${currentLbTab}"]`)?.click();
        });
        ui.targetSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            let text = "Normal", rate = 1000;
            if (val === 1) { text = "Slow"; rate = 1500; }
            if (val === 3) { text = "Fast"; rate = 500; }
            ui.targetVal.innerText = text;
            gameState.settings.spawnRate = rate;
        });

        const startGame = () => {
            gameState.score = 0;
            gameState.timeLeft = gameState.settings.duration;
            gameState.isPlaying = true;
            gameState.lastTime = performance.now();
            
            [...targets].forEach(removeTarget);
            particles.forEach(p => scene.remove(p.mesh));
            particles.length = 0;

            camera.rotation.set(0, 0, 0);
            euler.set(0,0,0);

            ui.scoreDisplay.innerText = "0";
            ui.timeDisplay.innerText = gameState.timeLeft;
            ui.timeDisplay.classList.remove('text-red-500');
            
            ui.mainMenu.classList.add('hidden');
            ui.gameOverMenu.classList.add('hidden');
            ui.leaderboardMenu.classList.add('hidden');
            ui.hud.style.display = 'flex';
            ui.crosshair.classList.remove('hidden');

            lockPointer();
        };

        const pauseGame = () => {
            gameState.isPlaying = false;
            ui.mainMenu.classList.remove('hidden');
            ui.hud.style.display = 'none';
            ui.crosshair.classList.add('hidden');
            ui.startBtn.innerText = "RESUME";
        };

        const endGame = () => {
            gameState.isPlaying = false;
            unlockPointer();
            
            ui.finalScore.innerText = gameState.score;
            ui.hud.style.display = 'none';
            ui.crosshair.classList.add('hidden');
            
            // Check High Score
            const duration = gameState.settings.duration;
            if (isHighScore(gameState.score, duration)) {
                ui.standardActions.classList.add('hidden');
                ui.highScoreForm.classList.remove('hidden');
                ui.hsDurationSpan.innerText = duration;
                ui.playerNameInput.value = '';
            } else {
                ui.standardActions.classList.remove('hidden');
                ui.highScoreForm.classList.add('hidden');
            }

            ui.gameOverMenu.classList.remove('hidden');
            ui.startBtn.innerText = "START NEW GAME"; 
        };

        // Submit High Score
        ui.submitScoreBtn.addEventListener('click', async () => {
            const name = ui.playerNameInput.value.trim() || "Anonymous";
            const score = gameState.score;
            const duration = gameState.settings.duration;

            ui.submitScoreBtn.innerText = "Saving...";
            ui.submitScoreBtn.disabled = true;

            try {
                if (currentUser && db) {
                    const lbRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                    await addDoc(lbRef, {
                        name: name,
                        score: score,
                        duration: duration,
                        timestamp: Date.now()
                    });
                }
            } catch(e) {
                console.error("Error saving score:", e);
            }

            // Move to leaderboards
            ui.submitScoreBtn.innerText = "Submit Score";
            ui.submitScoreBtn.disabled = false;
            ui.gameOverMenu.classList.add('hidden');
            
            currentLbTab = duration;
            document.querySelector(`.lb-tab[data-duration="${currentLbTab}"]`)?.click();
            ui.leaderboardMenu.classList.remove('hidden');
        });

        // Navigation Bindings
        ui.startBtn.addEventListener('click', startGame);
        ui.restartBtn.addEventListener('click', startGame);
        ui.menuBtn.addEventListener('click', () => {
            ui.gameOverMenu.classList.add('hidden');
            ui.mainMenu.classList.remove('hidden');
        });
        ui.showLbBtn.addEventListener('click', () => {
            ui.mainMenu.classList.add('hidden');
            ui.leaderboardMenu.classList.remove('hidden');
            renderLeaderboard();
        });
        ui.closeLbBtn.addEventListener('click', () => {
            ui.leaderboardMenu.classList.add('hidden');
            ui.mainMenu.classList.remove('hidden');
        });

        // Main Loop
        const animate = (time) => {
            requestAnimationFrame(animate);

            // Recoil recovery
            weapon.position.lerp(new THREE.Vector3(0.3, -0.3, -0.5), 0.1);
            weapon.rotation.x = THREE.MathUtils.lerp(weapon.rotation.x, 0, 0.1);

            if (gameState.isPlaying) {
                const deltaTime = time - gameState.lastTime;
                gameState.lastTime = time;

                gameState.timeLeft -= deltaTime / 1000;
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    endGame();
                } else {
                    const displayTime = Math.ceil(gameState.timeLeft);
                    ui.timeDisplay.innerText = displayTime;
                    if (displayTime <= 10) ui.timeDisplay.classList.add('text-red-500');
                }

                gameState.targetTimer += deltaTime;
                if (gameState.targetTimer > gameState.settings.spawnRate) {
                    spawnTarget();
                    gameState.targetTimer = 0;
                }

                for (let i = targets.length - 1; i >= 0; i--) {
                    const target = targets[i];
                    target.rotation.x += target.userData.rotX;
                    target.rotation.y += target.userData.rotY;
                    if (target.scale.x < 1) target.scale.addScalar(0.05);

                    if (time - target.userData.spawnTime > target.userData.lifespan) {
                        target.scale.subScalar(0.1);
                        if(target.scale.x <= 0) removeTarget(target);
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.05;
                p.mesh.scale.setScalar(p.life);
                p.velocity.y -= 0.02;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        };

        gameState.lastTime = performance.now();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
