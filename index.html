<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Practice FPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI Layer */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* HUD */
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: white; font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none; /* Hidden by default */
        }

        /* Menus */
        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; transition: opacity 0.3s;
        }
        
        .panel {
            background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 2rem; width: 90%; max-w: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            color: white;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; background: #475569; border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer;
            -webkit-appearance: none; margin-top: -6px; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .hit-marker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; pointer-events: none; opacity: 0; transition: opacity 0.1s;
        }
        .hit-marker::before, .hit-marker::after {
            content: ''; position: absolute; background: #ef4444; width: 2px; height: 10px;
        }
        .hit-marker::before { top: 0; left: 14px; transform: rotate(45deg); transform-origin: center bottom; }
        .hit-marker::after { top: 0; left: 14px; transform: rotate(-45deg); transform-origin: center bottom; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="ui-layer">
        <div id="crosshair" class="hidden"></div>
        <div id="hit-marker" class="hit-marker">
            <svg viewBox="0 0 100 100" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round">
                <line x1="20" y1="20" x2="40" y2="40" />
                <line x1="80" y1="20" x2="60" y2="40" />
                <line x1="20" y1="80" x2="40" y2="60" />
                <line x1="80" y1="80" x2="60" y2="60" />
            </svg>
        </div>
        
        <div id="hud">
            <div>Score: <span id="score-display" class="text-blue-400">0</span></div>
            <div>Time: <span id="time-display" class="text-white">60</span>s</div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="menu-overlay">
            <div class="panel max-w-md w-full">
                <h1 class="text-3xl font-bold mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">STATIONARY SHOOTER</h1>
                
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-sm mb-1 text-gray-300">
                            <label for="sens-slider">Mouse Sensitivity</label>
                            <span id="sens-val">0.5</span>
                        </div>
                        <input type="range" id="sens-slider" min="0.1" max="2.0" step="0.1" value="0.5">
                    </div>
                    
                    <div>
                        <div class="flex justify-between text-sm mb-1 text-gray-300">
                            <label for="time-slider">Game Duration (sec)</label>
                            <span id="time-val">60</span>
                        </div>
                        <input type="range" id="time-slider" min="30" max="120" step="10" value="60">
                    </div>

                    <div>
                        <div class="flex justify-between text-sm mb-1 text-gray-300">
                            <label for="target-slider">Target Spawn Rate</label>
                            <span id="target-val">Normal</span>
                        </div>
                        <input type="range" id="target-slider" min="1" max="3" step="1" value="2">
                    </div>
                </div>

                <button id="start-btn" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 shadow-lg">
                    START PLAYING
                </button>
                <p class="text-xs text-gray-400 text-center mt-4">Look around with mouse. Left click to shoot.<br>Press ESC to pause.</p>
            </div>
        </div>

        <!-- Game Over Menu -->
        <div id="game-over-menu" class="menu-overlay hidden">
            <div class="panel max-w-sm w-full text-center">
                <h2 class="text-4xl font-black mb-2 text-red-500">TIME'S UP</h2>
                <p class="text-gray-300 mb-6">Final Score</p>
                <div class="text-6xl font-bold text-white mb-8" id="final-score">0</div>
                
                <div class="flex gap-4">
                    <button id="restart-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        Play Again
                    </button>
                    <button id="menu-btn" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg">
                        Settings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Game State & Settings ---
        const gameState = {
            isPlaying: false,
            score: 0,
            timeLeft: 60,
            lastTime: 0,
            targetTimer: 0,
            settings: {
                sensitivity: 0.002, // Base multiplier for mouse movement
                duration: 60,
                spawnRate: 1000 // ms between spawns
            }
        };

        // --- DOM Elements ---
        const ui = {
            mainMenu: document.getElementById('main-menu'),
            gameOverMenu: document.getElementById('game-over-menu'),
            hud: document.getElementById('hud'),
            crosshair: document.getElementById('crosshair'),
            scoreDisplay: document.getElementById('score-display'),
            timeDisplay: document.getElementById('time-display'),
            finalScore: document.getElementById('final-score'),
            hitMarker: document.getElementById('hit-marker'),
            
            // Inputs
            sensSlider: document.getElementById('sens-slider'),
            sensVal: document.getElementById('sens-val'),
            timeSlider: document.getElementById('time-slider'),
            timeVal: document.getElementById('time-val'),
            targetSlider: document.getElementById('target-slider'),
            targetVal: document.getElementById('target-val'),
            
            // Buttons
            startBtn: document.getElementById('start-btn'),
            restartBtn: document.getElementById('restart-btn'),
            menuBtn: document.getElementById('menu-btn')
        };

        // --- Three.js Setup ---
        const container = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0); // Player eye level

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Environment
        const createEnvironment = () => {
            // Floor
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x2d4c1e, // Dark green grass
                roughness: 0.8,
                metalness: 0.1
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid helper for depth perception
            const gridHelper = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 50, -20);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            scene.add(dirLight);
        };
        createEnvironment();

        // Weapon (Simple box attached to camera)
        const createWeapon = () => {
            const gunGroup = new THREE.Group();
            
            const barrelGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 16);
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.8 });
            const barrel = new THREE.Mesh(barrelGeo, gunMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0.3, -0.3, -0.5);
            barrel.castShadow = true;
            gunGroup.add(barrel);

            const bodyGeo = new THREE.BoxGeometry(0.1, 0.15, 0.4);
            const body = new THREE.Mesh(bodyGeo, gunMat);
            body.position.set(0.3, -0.3, -0.1);
            body.castShadow = true;
            gunGroup.add(body);

            camera.add(gunGroup);
            scene.add(camera); // Add camera to scene since it holds children
            return gunGroup;
        };
        const weapon = createWeapon();

        // Target Management
        const targets = [];
        const targetGroup = new THREE.Group();
        scene.add(targetGroup);

        // Particle system for hits
        const particles = [];
        const particleGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);

        const spawnTarget = () => {
            if (!gameState.isPlaying) return;

            // Target visuals
            const isSpecial = Math.random() > 0.8;
            const geo = isSpecial ? new THREE.DodecahedronGeometry(0.6) : new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: isSpecial ? 0xffd700 : 0xef4444, // Gold or Red
                roughness: 0.3,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;

            // Random position mostly in front of player
            // X: -25 to 25, Y: 1 to 15, Z: -15 to -40
            const x = (Math.random() - 0.5) * 50;
            const y = Math.random() * 12 + 2;
            const z = -(Math.random() * 30 + 10);
            
            mesh.position.set(x, y, z);
            
            // Random rotation speed
            mesh.userData = {
                points: isSpecial ? 5 : 1,
                rotX: (Math.random() - 0.5) * 0.05,
                rotY: (Math.random() - 0.5) * 0.05,
                spawnTime: performance.now(),
                lifespan: isSpecial ? 3000 : 5000 // Dies after 3 or 5 seconds
            };

            // Entrance animation scale
            mesh.scale.set(0.1, 0.1, 0.1);
            
            targetGroup.add(mesh);
            targets.push(mesh);
        };

        const createExplosion = (position, color) => {
            const count = 15;
            const mat = new THREE.MeshBasicMaterial({ color: color });
            
            for(let i=0; i<count; i++) {
                const particle = new THREE.Mesh(particleGeo, mat);
                particle.position.copy(position);
                
                // Random velocity outward
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                
                particles.push({
                    mesh: particle,
                    velocity: velocity,
                    life: 1.0 // 1.0 to 0.0
                });
                scene.add(particle);
            }
        };

        // --- Controls & Input ---
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const PI_2 = Math.PI / 2;
        
        const lockPointer = () => document.body.requestPointerLock();
        const unlockPointer = () => document.exitPointerLock();

        const onMouseMove = (event) => {
            if (document.pointerLockElement === document.body && gameState.isPlaying) {
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

                euler.setFromQuaternion(camera.quaternion);

                // Apply sensitivity
                euler.y -= movementX * gameState.settings.sensitivity;
                euler.x -= movementY * gameState.settings.sensitivity;

                // Clamp looking up and down
                euler.x = Math.max(-PI_2 + 0.1, Math.min(PI_2 - 0.1, euler.x));

                camera.quaternion.setFromEuler(euler);
            }
        };

        // Shooting Mechanics
        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0); // Screen center for pointerlock

        const shoot = () => {
            if (!gameState.isPlaying || document.pointerLockElement !== document.body) return;

            // Weapon recoil animation
            weapon.position.z += 0.1;
            weapon.rotation.x += 0.05;

            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitTarget = intersects[0].object;
                
                // Score
                gameState.score += hitTarget.userData.points;
                ui.scoreDisplay.innerText = gameState.score;
                
                // Visual feedback
                createExplosion(hitTarget.position, hitTarget.material.color.getHex());
                showHitMarker();
                
                // Remove target
                removeTarget(hitTarget);
            }
        };

        const removeTarget = (target) => {
            targetGroup.remove(target);
            const index = targets.indexOf(target);
            if (index > -1) targets.splice(index, 1);
            // Dispose geometry/material to prevent memory leaks
            target.geometry.dispose();
            target.material.dispose();
        };

        const showHitMarker = () => {
            ui.hitMarker.style.opacity = '1';
            // Slight scale effect
            ui.hitMarker.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => {
                ui.hitMarker.style.transform = 'translate(-50%, -50%) scale(1)';
                ui.hitMarker.style.opacity = '0';
            }, 100);
        };

        // Event Listeners
        document.addEventListener('mousemove', onMouseMove, false);
        document.addEventListener('mousedown', (e) => {
            if(e.button === 0) shoot(); // Left click
        }, false);

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement !== document.body && gameState.isPlaying) {
                // User pressed ESC
                pauseGame();
            }
        }, false);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI Logic & Game Flow ---

        // Update settings from UI
        ui.sensSlider.addEventListener('input', (e) => {
            ui.sensVal.innerText = e.target.value;
            // Map 0.1-2.0 to a sensible rotation multiplier
            gameState.settings.sensitivity = parseFloat(e.target.value) * 0.004;
        });

        ui.timeSlider.addEventListener('input', (e) => {
            ui.timeVal.innerText = e.target.value;
            gameState.settings.duration = parseInt(e.target.value);
        });

        ui.targetSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            let text = "Normal", rate = 1000;
            if (val === 1) { text = "Slow"; rate = 1500; }
            if (val === 3) { text = "Fast"; rate = 500; }
            ui.targetVal.innerText = text;
            gameState.settings.spawnRate = rate;
        });

        const startGame = () => {
            // Reset state
            gameState.score = 0;
            gameState.timeLeft = gameState.settings.duration;
            gameState.isPlaying = true;
            gameState.lastTime = performance.now();
            
            // Clear existing targets and particles
            [...targets].forEach(removeTarget);
            particles.forEach(p => scene.remove(p.mesh));
            particles.length = 0;

            // Reset Camera rotation
            camera.rotation.set(0, 0, 0);
            euler.set(0,0,0);

            // Update UI
            ui.scoreDisplay.innerText = "0";
            ui.timeDisplay.innerText = gameState.timeLeft;
            ui.timeDisplay.classList.remove('text-red-500');
            
            ui.mainMenu.classList.add('hidden');
            ui.gameOverMenu.classList.add('hidden');
            ui.hud.style.display = 'flex';
            ui.crosshair.classList.remove('hidden');

            lockPointer();
        };

        const pauseGame = () => {
            gameState.isPlaying = false;
            ui.mainMenu.classList.remove('hidden');
            ui.hud.style.display = 'none';
            ui.crosshair.classList.add('hidden');
            ui.startBtn.innerText = "RESUME";
        };

        const endGame = () => {
            gameState.isPlaying = false;
            unlockPointer();
            
            ui.finalScore.innerText = gameState.score;
            ui.hud.style.display = 'none';
            ui.crosshair.classList.add('hidden');
            ui.gameOverMenu.classList.remove('hidden');
            ui.startBtn.innerText = "START NEW GAME"; // Reset main menu button
        };

        ui.startBtn.addEventListener('click', startGame);
        ui.restartBtn.addEventListener('click', startGame);
        ui.menuBtn.addEventListener('click', () => {
            ui.gameOverMenu.classList.add('hidden');
            ui.mainMenu.classList.remove('hidden');
        });

        // --- Main Game Loop ---
        const animate = (time) => {
            requestAnimationFrame(animate);

            // Return weapon to original position (recoil recovery)
            weapon.position.lerp(new THREE.Vector3(0.3, -0.3, -0.5), 0.1);
            weapon.rotation.x = THREE.MathUtils.lerp(weapon.rotation.x, 0, 0.1);

            if (gameState.isPlaying) {
                const deltaTime = time - gameState.lastTime;
                gameState.lastTime = time;

                // Timer Logic
                gameState.timeLeft -= deltaTime / 1000;
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    endGame();
                } else {
                    const displayTime = Math.ceil(gameState.timeLeft);
                    ui.timeDisplay.innerText = displayTime;
                    if (displayTime <= 10) ui.timeDisplay.classList.add('text-red-500');
                }

                // Target Spawning
                gameState.targetTimer += deltaTime;
                if (gameState.targetTimer > gameState.settings.spawnRate) {
                    spawnTarget();
                    gameState.targetTimer = 0;
                }

                // Update Targets
                for (let i = targets.length - 1; i >= 0; i--) {
                    const target = targets[i];
                    
                    // Rotate
                    target.rotation.x += target.userData.rotX;
                    target.rotation.y += target.userData.rotY;

                    // Scale up entrance animation
                    if (target.scale.x < 1) {
                        target.scale.addScalar(0.05);
                    }

                    // Lifespan check
                    const age = time - target.userData.spawnTime;
                    if (age > target.userData.lifespan) {
                        // Shrink before deleting
                        target.scale.subScalar(0.1);
                        if(target.scale.x <= 0) {
                            removeTarget(target);
                        }
                    }
                }
            }

            // Update Particles (always run to finish explosions even if paused/game over)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.05;
                p.mesh.scale.setScalar(p.life);
                
                // Add gravity to particles
                p.velocity.y -= 0.02;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        };

        // Initialize state variables on load
        gameState.lastTime = performance.now();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
