<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLYGON STRIKE: TACTICAL OPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: #0f0; text-shadow: 2px 2px 0px #000;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; border: 2px solid #0f0;
            transform: translate(-50%, -50%);
        }

        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(255, 0, 0, 0.4) 100%);
            opacity: 0; transition: opacity 0.1s; pointer-events: none;
        }

        #hud {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 50px;
            box-sizing: border-box; font-size: 28px; font-weight: bold;
        }

        .stat-box { background: rgba(0, 40, 0, 0.7); padding: 10px 20px; border: 2px solid #0f0; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,10,0,0.95) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: all; text-align: center;
        }

        h1 { font-size: 60px; margin-bottom: 10px; color: #0f0; border-bottom: 4px solid #0f0; }
        button {
            padding: 15px 50px; font-size: 24px; cursor: pointer;
            background: #0f0; border: none; color: #000; font-weight: bold;
            text-transform: uppercase;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="hud">
            <div class="stat-box">HP: <span id="hp-val">100</span></div>
            <div class="stat-box"><span id="wpn-name">AK-47</span>: <span id="ammo-val">30/90</span></div>
        </div>

        <div id="menu" class="overlay">
            <h1>POLYGON STRIKE</h1>
            <p>WASD: Move | MOUSE: Aim | LEFT-CLICK: Shoot | RIGHT-CLICK: ADS | 1-3: Swap</p>
            <button id="start-btn">DEPLOY</button>
        </div>

        <div id="end-screen" class="overlay hidden">
            <h1 id="msg">MISSION FAILED</h1>
            <button id="restart-btn">RESTART</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. SETUP & WEAPON DATA
        // ==========================================
        const clock = new THREE.Clock();
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const WEAPONS = {
            1: { name: "AK-47", damage: 34, fireRate: 110, ammo: 30, reserve: 90, spread: 0.04, adsFov: 50, recoil: 0.05, build: buildAK },
            2: { name: "DEAGLE", damage: 55, fireRate: 450, ammo: 7, reserve: 35, spread: 0.01, adsFov: 60, recoil: 0.12, build: buildDeagle },
            3: { name: "AWP", damage: 150, fireRate: 1500, ammo: 5, reserve: 20, spread: 0.001, adsFov: 20, recoil: 0.25, build: buildAWP }
        };

        let currentWpnId = 1;
        let isADS = false;
        let lastFire = 0;
        const player = { hp: 100, rot: new THREE.Euler(0, 0, 0, 'YXZ'), vel: new THREE.Vector3() };
        const gameState = { active: false, enemies: [], objects: [] };

        // ==========================================
        // 2. PROCEDURAL WEAPON MODELS
        // ==========================================
        const gunContainer = new THREE.Group();
        camera.add(gunContainer);
        scene.add(camera);

        function buildAK() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshStandardMaterial({color: 0x111111}));
            barrel.rotation.x = Math.PI/2; barrel.position.z = -0.5;
            const mag = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.2, 0.15), new THREE.MeshStandardMaterial({color: 0x332211}));
            mag.position.set(0, -0.15, -0.1);
            const stock = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.12, 0.3), new THREE.MeshStandardMaterial({color: 0x332211}));
            stock.position.z = 0.4;
            group.add(body, barrel, mag, stock);
            return group;
        }

        function buildDeagle() {
            const group = new THREE.Group();
            const slide = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.4), new THREE.MeshStandardMaterial({color: 0x777777}));
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x111111}));
            grip.position.set(0, -0.15, 0.1); grip.rotation.x = 0.2;
            group.add(slide, grip);
            return group;
        }

        function buildAWP() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.18, 1.0), new THREE.MeshStandardMaterial({color: 0x1a2e1a}));
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.8), new THREE.MeshStandardMaterial({color: 0x000000}));
            barrel.rotation.x = Math.PI/2; barrel.position.z = -0.8;
            const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.3), new THREE.MeshStandardMaterial({color: 0x111111}));
            scope.rotation.x = Math.PI/2; scope.position.y = 0.15;
            group.add(body, barrel, scope);
            return group;
        }

        function switchWeapon(id) {
            currentWpnId = id;
            gunContainer.clear();
            const model = WEAPONS[id].build();
            gunContainer.add(model);
            updateUI();
        }

        // ==========================================
        // 3. WORLD GENERATION
        // ==========================================
        const world = new THREE.Group();
        scene.add(world);

        function createMap() {
            world.clear(); gameState.objects = [];
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x333333}));
            floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
            world.add(floor);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(20, 40, 20); sun.castShadow = true;
            world.add(sun, new THREE.AmbientLight(0xffffff, 0.4));

            const addBox = (w,h,d,x,y,z) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: 0x555555}));
                m.position.set(x,y,z); m.castShadow = m.receiveShadow = true;
                world.add(m); gameState.objects.push(new THREE.Box3().setFromObject(m));
            };
            // Boundaries
            addBox(100, 10, 2, 0, 5, -50); addBox(100, 10, 2, 0, 5, 50);
            addBox(2, 10, 100, -50, 5, 0); addBox(2, 10, 100, 50, 5, 0);
            // Obstacles
            addBox(10, 4, 10, 15, 2, 15); addBox(15, 6, 5, -20, 3, 0);
        }

        // ==========================================
        // 4. CORE MECHANICS (ADS, Damage, Input)
        // ==========================================
        const keys = {};
        window.onkeydown = (e) => {
            keys[e.code] = true;
            if (e.key === '1') switchWeapon(1);
            if (e.key === '2') switchWeapon(2);
            if (e.key === '3') switchWeapon(3);
        };
        window.onkeyup = (e) => keys[e.code] = false;

        window.onmousedown = (e) => {
            if (!gameState.active) return;
            if (e.button === 0) shoot();
            if (e.button === 2) isADS = true;
        };
        window.onmouseup = (e) => { if (e.button === 2) isADS = false; };
        window.oncontextmenu = (e) => e.preventDefault();

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                const sensitivity = isADS ? 0.001 : 0.002;
                player.rot.y -= e.movementX * sensitivity;
                player.rot.x -= e.movementY * sensitivity;
                player.rot.x = Math.max(-1.5, Math.min(1.5, player.rot.x));
                camera.quaternion.setFromEuler(player.rot);
            }
        });

        function takeDamage(amt) {
            player.hp -= amt;
            const flash = document.getElementById('damage-flash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 100);
            updateUI();
            if (player.hp <= 0) endGame("KILLED IN ACTION");
        }

        function shoot() {
            const w = WEAPONS[currentWpnId];
            if (Date.now() - lastFire < w.fireRate || w.ammo <= 0) return;
            lastFire = Date.now();
            w.ammo--;
            updateUI();

            // Visual Kick
            gunContainer.position.z += 0.1;
            gunContainer.rotation.x -= w.recoil;

            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const spreadAmt = isADS ? w.spread * 0.2 : w.spread;
            dir.x += (Math.random()-0.5) * spreadAmt;
            dir.y += (Math.random()-0.5) * spreadAmt;
            
            ray.set(camera.position, dir);
            const hits = ray.intersectObjects(gameState.enemies.map(e => e.mesh).concat(world.children));

            if (hits.length > 0) {
                const enemy = gameState.enemies.find(e => e.mesh === hits[0].object);
                if (enemy) enemy.hp -= w.damage;
                // Hit spark
                const spark = new THREE.PointLight(0xffff00, 5, 1);
                spark.position.copy(hits[0].point);
                scene.add(spark);
                setTimeout(() => scene.remove(spark), 40);
            }
        }

        // ==========================================
        // 5. ENEMY LOGIC
        // ==========================================
        class Enemy {
            constructor(x, z) {
                this.hp = 100;
                this.mesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0xff4444}));
                this.mesh.position.set(x, 1, z);
                scene.add(this.mesh);
                this.lastShot = 0;
            }
            update() {
                if (this.hp <= 0) {
                    scene.remove(this.mesh);
                    return false;
                }
                const dist = this.mesh.position.distanceTo(camera.position);
                if (dist < 30) {
                    this.mesh.lookAt(camera.position.x, 1, camera.position.z);
                    if (Date.now() - this.lastShot > 2000) {
                        takeDamage(15);
                        this.lastShot = Date.now();
                    }
                }
                return true;
            }
        }

        // ==========================================
        // 6. GAME LOOP
        // ==========================================
        function updateUI() {
            document.getElementById('hp-val').innerText = Math.max(0, player.hp);
            const w = WEAPONS[currentWpnId];
            document.getElementById('wpn-name').innerText = w.name;
            document.getElementById('ammo-val').innerText = `${w.ammo}/${w.reserve}`;
        }

        function endGame(m) {
            gameState.active = false; document.exitPointerLock();
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('msg').innerText = m;
        }

        function loop() {
            requestAnimationFrame(loop);
            if (gameState.active) {
                // Movement
                const move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1; if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1; if (keys['KeyD']) move.x += 1;
                move.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rot.y).normalize().multiplyScalar(0.12);
                
                const nextPos = camera.position.clone().add(move);
                let col = false;
                const pBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.6, 1.8, 0.6));
                for(let obj of gameState.objects) if(pBox.intersectsBox(obj)) col = true;
                if(!col) camera.position.copy(nextPos);

                // ADS & Gun Lerping
                const targetFov = isADS ? WEAPONS[currentWpnId].adsFov : 75;
                camera.fov += (targetFov - camera.fov) * 0.2;
                camera.updateProjectionMatrix();

                const targetPos = isADS ? new THREE.Vector3(0, -0.15, -0.3) : new THREE.Vector3(0.3, -0.25, -0.5);
                gunContainer.position.lerp(targetPos, 0.2);
                gunContainer.rotation.x *= 0.9; // recoil recovery

                gameState.enemies = gameState.enemies.filter(e => e.update());
                if (gameState.enemies.length === 0) endGame("AREA SECURED");
            }
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = () => {
            gameState.active = true; player.hp = 100;
            camera.position.set(0, 1.7, 5);
            document.body.requestPointerLock();
            document.getElementById('menu').classList.add('hidden');
            createMap();
            gameState.enemies = [new Enemy(10, -10), new Enemy(-15, -20), new Enemy(0, -30)];
            switchWeapon(1);
        };

        document.getElementById('restart-btn').onclick = () => location.reload();
        
        createMap();
        loop();
    </script>
</body>
</html>
