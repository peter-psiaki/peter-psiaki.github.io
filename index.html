<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Anonymous Board</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #postBox {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }

    .post {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .time {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>Anonymous Board</h1>

  <textarea id="postBox" placeholder="Write something anonymously..."></textarea>
  <br>
  <button onclick="addPost()">Post</button>
  <button onclick="clearPosts()">Clear All</button>

  <div id="posts"></div>

  <script>
    function loadPosts() {
      const posts = JSON.parse(localStorage.getItem("posts") || "[]");
      const container = document.getElementById("posts");
      container.innerHTML = "";

      posts.reverse().forEach(p => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <div>${p.text}</div>
          <div class="time">${p.time}</div>
        `;
        container.appendChild(div);
      });
    }

    function addPost() {
      const box = document.getElementById("postBox");
      const text = box.value.trim();

      if (!text) return;

      const posts = JSON.parse(localStorage.getItem("posts") || "[]");

      posts.push({
        text,
        time: new Date().toLocaleString()
      });

      localStorage.setItem("posts", JSON.stringify(posts));
      box.value = "";
      loadPosts();
    }

    function clearPosts() {
      localStorage.removeItem("posts");
      loadPosts();
    }

    loadPosts();
  </script>

</body>
</html>
